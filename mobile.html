<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#082c28" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FieldFlow Tech" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>FieldFlow Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#102925;--muted:#71817d;--deep:#082c28;--green:#18a57b;--lime:#c9f36a;--coral:#ff765f;--amber:#e9a93d;--blue:#4285f4;--bg:#eef1ec;--line:#e3e8e2;--white:#fff;font-family:'DM Sans',sans-serif;color:var(--ink)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);min-height:100vh;min-height:100dvh}
    button{font:inherit;cursor:pointer}
    .wrap{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

    .appbar{position:sticky;top:0;z-index:10;background:var(--deep);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;display:flex;align-items:center;gap:12px}
    .appbar .mark{width:32px;height:32px;background:var(--lime);border-radius:9px;display:flex;align-items:flex-end;justify-content:center;gap:2.5px;padding:8px;flex:none}
    .appbar .mark span{display:block;width:3.5px;background:var(--deep);border-radius:3px}
    .appbar .mark span:nth-child(1){height:9px}.appbar .mark span:nth-child(2){height:15px}.appbar .mark span:nth-child(3){height:12px}
    .appbar h1{font:800 15px Manrope;margin:0;flex:1}
    .appbar h1 small{display:block;font:600 10px 'DM Sans';color:#9fc3b8;margin-top:2px}
    .menu-btn{border:1px solid #2a544e;background:#0e3531;color:#cfe1dc;border-radius:9px;font-size:16px;font-weight:700;padding:6px 11px;line-height:1}
    .menu-pop{position:absolute;right:14px;top:60px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 34px rgba(24,49,44,.18);z-index:20;overflow:hidden;min-width:190px}
    .menu-pop button{display:block;width:100%;text-align:left;border:0;background:#fff;padding:13px 16px;font-size:13px;font-weight:600;color:var(--ink)}
    .menu-pop button+button{border-top:1px solid #eef1ed}
    .menu-pop button.danger{color:var(--coral)}
    .menu-pop button:active{background:#f4f6f3}

    .syncbar{display:flex;align-items:center;gap:7px;padding:8px 18px;background:#fff;border-bottom:1px solid var(--line);font-size:11px;color:#52635f;font-weight:600}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:#b0bab7;transition:.2s}
    .syncbar.live .sync-dot{background:var(--green);box-shadow:0 0 0 3px #18a57b22}
    .syncbar.syncing .sync-dot{background:var(--amber)}
    .syncbar.error .sync-dot{background:var(--coral)}
    .syncbar .stamp{margin-left:auto;color:#9aa6a2;font-weight:500}

    .auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 22px}
    .auth .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 14px 34px rgba(24,49,44,.08)}
    .auth h2{font:800 20px Manrope;margin:0 0 4px}
    .auth p{font-size:13px;color:var(--muted);margin:0 0 20px}
    .field{margin-bottom:14px}
    .field label{font-size:11px;font-weight:700;color:#586965;display:block;margin-bottom:7px}
    .field input{width:100%;border:1px solid #dfe5df;border-radius:11px;padding:13px 12px;font-size:16px;background:#fff;outline:0}
    .field input:focus{border-color:var(--green);box-shadow:0 0 0 3px #18a57b17}
    .btn-primary{width:100%;border:0;background:var(--deep);color:#fff;border-radius:11px;padding:14px;font-weight:700;font-size:15px;margin-top:6px}
    .btn-primary:disabled{opacity:.6}
    .btn-primary:active{transform:translateY(1px)}
    .btn-ghost{width:100%;border:0;background:transparent;color:#127b5d;font-weight:700;font-size:13px;padding:12px;margin-top:4px}
    .err{background:#fff0ed;border:1px solid #f6c9bf;color:#c2503a;border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:14px;display:none}
    .err.show{display:block}
    .hint{background:#f2fbf7;border:1px solid #bfe6d5;color:#0f6f53;border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:16px}

    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:14px 16px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px}
    .stat b{display:block;font:800 20px Manrope}
    .stat span{font-size:10px;color:#7f8d89}
    .stat.green b{color:var(--green)}.stat.amber b{color:#c98a1e}.stat.blue b{color:var(--blue)}

    .jobs{flex:1;padding:4px 16px calc(env(safe-area-inset-bottom) + 24px);display:flex;flex-direction:column;gap:11px}
    .job{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px;box-shadow:0 4px 16px rgba(25,48,43,.04)}
    .job-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .job-id{font-size:10px;color:#74837f;font-weight:700}
    .job h3{font:700 15px Manrope;margin:7px 0 2px}
    .job .plan{font-size:12px;color:var(--muted);margin:0}
    .badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 9px;font-size:9px;font-weight:800;white-space:nowrap}
    .badge:before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
    .b-assigned{background:#f0ebff;color:#7959c7}.b-en-route{background:#eaf1ff;color:#3473d8}.b-on-site{background:#e7f7ef;color:#11825f}.b-in-progress{background:#e8f7f5;color:#168b81}.b-completed{background:#e7f7ef;color:#11825f}.b-pending{background:#fff4e1;color:#b97a16}
    .prio{font-size:9px;font-weight:800;text-transform:uppercase;color:#d6614e;background:#fff0ed;border-radius:9px;padding:3px 7px;margin-left:6px}
    .prio.vip{color:#7959c7;background:#f0ebff}
    .job-meta{margin:12px 0;display:flex;flex-direction:column;gap:6px;font-size:12px;color:#566b66}
    .job-meta .row{display:flex;gap:8px;align-items:center}
    .job-meta svg{width:15px;height:15px;color:#90a09b;flex:none}
    .job-actions{display:flex;gap:8px;border-top:1px solid #eef1ed;padding-top:12px}
    .act{flex:1;border:1px solid #dfe5df;background:#fff;border-radius:10px;padding:11px;font-weight:700;font-size:12px;color:#127b5d;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
    .act svg{width:15px;height:15px}
    .act.go{background:var(--green);border-color:var(--green);color:#fff}
    .act.done{background:var(--deep);border-color:var(--deep);color:#fff}
    .act.ghost{flex:0 0 auto;color:#52635f}
    .act:active{transform:translateY(1px)}
    .empty{text-align:center;color:#9aa6a2;padding:48px 20px;font-size:13px}
    .empty svg{width:40px;height:40px;color:#c2ccc8;display:block;margin:0 auto 12px}

    .jobtabs{display:flex;gap:6px;padding:12px 16px 2px}
    .jt{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;font-weight:700;font-size:12px;color:#647571}
    .jt.active{background:var(--deep);border-color:var(--deep);color:#fff}
    .photos{border-top:1px solid #eef1ed;margin-top:12px;padding-top:12px}
    .photos-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:#566b66;margin-bottom:8px}
    .photos-head .count{font-weight:800}
    .photos-head .ok{color:var(--green)}.photos-head .need{color:#c98a1e}
    .thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .thumbs img{width:46px;height:46px;object-fit:cover;border-radius:7px;border:1px solid var(--line)}
    .thumbs .more{width:46px;height:46px;border-radius:7px;background:#eef1ec;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#647571}
    .addphoto{display:flex;align-items:center;justify-content:center;gap:6px;border:1px dashed #bcd9cd;background:#f2fbf7;color:#127b5d;border-radius:10px;padding:11px;font-weight:700;font-size:12px;cursor:pointer}
    .addphoto svg{width:15px;height:15px}
    .act:disabled{opacity:.5;cursor:not-allowed}

    .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%) translateY(80px);background:#102925;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 12px 30px rgba(12,37,33,.3);opacity:0;transition:.3s;z-index:50;max-width:90%}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .hidden{display:none!important}
    @media(prefers-reduced-motion:reduce){*{transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="appbar">
      <div class="mark"><span></span><span></span><span></span></div>
      <h1>FieldFlow Tech<small id="teamName">Field technician</small></h1>
      <button class="menu-btn hidden" id="menuBtn" aria-label="Menu">⋯</button>
    </div>
    <div class="menu-pop hidden" id="menuPop">
      <button id="mLocate">Update my location</button>
      <button id="mChangePw">Change password</button>
      <button id="mLogout" class="danger">Time out &amp; sign out</button>
    </div>

    <!-- LOGIN -->
    <div class="auth" id="loginView">
      <div class="card">
        <h2>Field sign-in</h2>
        <p>Sign in with your technician account to see the jobs dispatched to you.</p>
        <div class="err" id="loginErr"></div>
        <form id="loginForm">
          <div class="field"><label for="uName">Username</label><input id="uName" autocapitalize="characters" autocomplete="username" placeholder="AHBA_SLI001" required></div>
          <div class="field"><label for="uPass">Password</label><input id="uPass" type="password" autocomplete="current-password" placeholder="••••••••" required></div>
          <button class="btn-primary" id="loginBtn" type="submit">Sign in</button>
        </form>
      </div>
    </div>

    <!-- CHANGE / SET PASSWORD -->
    <div class="auth hidden" id="pwView">
      <div class="card">
        <h2 id="pwTitle">Set a new password</h2>
        <p id="pwSub">For your security, please choose a new password.</p>
        <div class="hint" id="pwForceHint">This is your first sign-in — please replace the default password.</div>
        <div class="err" id="pwErr"></div>
        <form id="pwForm">
          <div class="field"><label for="np1">New password</label><input id="np1" type="password" autocomplete="new-password" placeholder="At least 8 characters" required></div>
          <div class="field"><label for="np2">Confirm new password</label><input id="np2" type="password" autocomplete="new-password" placeholder="Re-enter password" required></div>
          <button class="btn-primary" id="pwBtn" type="submit">Save password</button>
          <button class="btn-ghost hidden" id="pwCancel" type="button">Cancel</button>
        </form>
      </div>
    </div>

    <!-- APP -->
    <div class="hidden" id="appView">
      <div class="syncbar syncing" id="syncbar"><span class="sync-dot"></span><span class="sync-text" id="syncText">Connecting…</span><span class="stamp" id="syncStamp"></span></div>
      <div class="summary">
        <div class="stat amber"><b id="cToDo">0</b><span>To do</span></div>
        <div class="stat blue"><b id="cActive">0</b><span>In progress</span></div>
        <div class="stat green"><b id="cDone">0</b><span>Completed</span></div>
      </div>
      <div class="jobtabs">
        <button class="jt active" id="tabActive" data-view="active">Active</button>
        <button class="jt" id="tabDone" data-view="done">Completed today</button>
      </div>
      <div class="jobs" id="jobsList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function(){
    const SUPA_URL = 'https://avjzkfxgzeyxtihkofed.supabase.co';
    const SUPA_KEY = 'sb_publishable_2JM51zp2r5GUICznc6Nz4Q_B4UFS1da';
    const EMAIL_DOMAIN = 'ahbafield.app';
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

    const $ = s => document.querySelector(s);
    let myTeam = '';        // AHBA_SLI004
    let jobs = [];
    let signature = '';
    let realtimeChan = null;
    let attendanceId = null;   // current open time-in record
    let pwForced = false;      // was the password screen a forced first-login?
    let viewMode = 'active';   // 'active' | 'done'
    let photoData = {};        // jobId -> [paths]
    const PHOTOS_REQUIRED = 18;
    const pubUrl = path => `${SUPA_URL}/storage/v1/object/public/job-photos/${path}`;

    const emailFor = u => u.trim().toLowerCase() + '@' + EMAIL_DOMAIN;
    const teamFromEmail = e => (e||'').split('@')[0].toUpperCase();
    const TZ = 'Asia/Manila';
    const manilaDate = () => new Date().toLocaleDateString('en-CA', {timeZone: TZ}); // YYYY-MM-DD
    const manilaTime = d => new Date(d).toLocaleTimeString('en-PH', {timeZone: TZ, hour:'numeric', minute:'2-digit'});

    const ic = {
      pin:'<path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2"/>',
      clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
      truck:'<path d="M10 17h4V5H2v12h3M14 9h4l4 4v4h-3M8 17a3 3 0 1 1-6 0M22 17a3 3 0 1 1-6 0"/>',
      check:'<path d="m20 6-11 11-5-5"/>', play:'<polygon points="6 4 20 12 6 20 6 4"/>',
      camera:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
      phone:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/>',
      note:'<path d="M9 5H6a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/>',
      inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.5Z"/>'
    };
    const svg = n => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${ic[n]||''}</svg>`;
    function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2600)}
    function setSync(state,text){const b=$('#syncbar');b.className='syncbar '+state;$('#syncText').textContent=text;if(state==='live')$('#syncStamp').textContent='Updated '+manilaTime(new Date())}

    // ---------- attendance (time in / time out) ----------
    async function clockIn(){
      try{
        const {data,error}=await sb.from('attendance').insert({username:myTeam, work_date:manilaDate()}).select('id,time_in').single();
        if(error) throw error;
        attendanceId = data?.id || null;
        if(data?.time_in) toast('Timed in at '+manilaTime(data.time_in));
      }catch(e){ console.warn('clockIn',e.message); toast('Timed in'); }
    }
    async function findOpenAttendance(){
      try{
        const {data}=await sb.from('attendance').select('id').eq('username',myTeam).is('time_out',null)
          .eq('work_date',manilaDate()).order('time_in',{ascending:false}).limit(1);
        attendanceId = (data && data[0]) ? data[0].id : null;
      }catch(e){ attendanceId=null; }
    }
    async function clockOut(){
      if(!attendanceId) return;
      try{ await sb.from('attendance').update({time_out:new Date().toISOString()}).eq('id',attendanceId); }
      catch(e){ console.warn('clockOut',e.message); }
      attendanceId=null;
    }

    // ---------- GPS location ----------
    function captureLocation(announce){
      if(!navigator.geolocation){ if(announce)toast('GPS not available on this device'); return; }
      navigator.geolocation.getCurrentPosition(async pos=>{
        const {latitude, longitude} = pos.coords;
        try{
          await sb.from('technicians').update({lat:latitude, lng:longitude, location_at:new Date().toISOString(), updated_at:new Date().toISOString()}).eq('username',myTeam);
          if(announce) toast('Location updated');
        }catch(e){ console.warn('loc',e.message); }
      }, err=>{
        console.warn('geo', err.message);
        if(announce || err.code===1) toast('Turn on Location so dispatch can find you');
      }, {enableHighAccuracy:true, timeout:15000, maximumAge:60000});
    }
    function showErr(id,msg){const e=$(id);e.textContent=msg;e.classList.add('show')}
    function clearErr(id){$(id).classList.remove('show')}

    const FLOW = {
      assigned:{label:'Assigned',next:'en-route',action:'Start travel',icon:'truck',cls:'go'},
      'en-route':{label:'On the way',next:'on-site',action:'Arrived',icon:'pin',cls:'go'},
      'on-site':{label:'On site',next:'in-progress',action:'Start work',icon:'play',cls:'go'},
      'in-progress':{label:'Working',next:'completed',action:'Mark complete',icon:'check',cls:'done'},
      completed:{label:'Completed',next:null,action:null},
      pending:{label:'Awaiting dispatch',next:null,action:null}
    };
    const statusLabel = s => (FLOW[s]?.label)||s;

    // ---------- views ----------
    function show(view){['loginView','pwView','appView'].forEach(v=>$('#'+v).classList.toggle('hidden', v!==view));$('#menuBtn').classList.toggle('hidden', view!=='appView');$('#menuPop').classList.add('hidden')}

    // ---------- data ----------
    async function loadJobs(){
      const {data,error} = await sb.from('jobs').select('*').eq('team',myTeam).order('updated_at',{ascending:false});
      if(error) throw error; return data||[];
    }
    async function loadPhotos(){
      const ids=jobs.map(j=>j.id); if(!ids.length){photoData={};return;}
      try{
        const {data}=await sb.from('job_photos').select('job_id,path').in('job_id',ids);
        const m={}; (data||[]).forEach(r=>{(m[r.job_id]=m[r.job_id]||[]).push(r.path)}); photoData=m;
      }catch(e){ /* keep previous counts */ }
    }
    const photoCount = id => (photoData[id]||[]).length;
    async function refresh(){
      try{ jobs=await loadJobs(); await loadPhotos(); render(); setSync('live','Synced'); }
      catch(err){ setSync('error','Sync error'); console.warn('sync:',err.message) }
    }
    async function advance(id,next){
      const job=jobs.find(j=>j.id===id); if(!job) return;
      if(next==='completed' && photoCount(id)<PHOTOS_REQUIRED){ toast(`Attach ${PHOTOS_REQUIRED} photos first (${photoCount(id)}/${PHOTOS_REQUIRED})`); return; }
      const prev=job.status; job.status=next; render(); setSync('syncing','Saving…');
      const {error}=await sb.from('jobs').update({status:next, updated_at:new Date().toISOString()}).eq('id',id);
      if(error){ job.status=prev; render(); setSync('error','Sync error'); toast('Could not save: '+error.message); }
      else { setSync('live','Synced'); toast(`${id} → ${statusLabel(next)}`); }
    }
    // Compress/resize a photo so each upload stays small (~120 KB) to save cloud space.
    function compressImage(file, maxDim=1000, targetKB=120){
      return new Promise(resolve=>{
        if(!file || !(file.type||'').startsWith('image/')){ resolve(file); return; }
        const img=new Image(); const url=URL.createObjectURL(file);
        img.onload=async ()=>{
          let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
          const scale=Math.min(1, maxDim/Math.max(w,h)); w=Math.round(w*scale); h=Math.round(h*scale);
          const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          const toBlob=q=>new Promise(r=>cv.toBlob(b=>r(b),'image/jpeg',q));
          let q=0.6, blob=await toBlob(q);
          while(blob && blob.size>targetKB*1024 && q>0.3){ q=Math.round((q-0.1)*10)/10; blob=await toBlob(q); }
          URL.revokeObjectURL(url); resolve(blob||file);
        };
        img.onerror=()=>{ URL.revokeObjectURL(url); resolve(file); };
        img.src=url;
      });
    }
    async function uploadPhotos(jobId, fileList){
      const files=[...fileList]; if(!files.length)return;
      toast(`Compressing & uploading ${files.length} photo${files.length>1?'s':''}…`);
      let ok=0;
      for(const f of files){
        try{
          const blob=await compressImage(f);
          const path=`${jobId}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
          const {error}=await sb.storage.from('job-photos').upload(path, blob, {contentType:'image/jpeg', upsert:false});
          if(error) throw error;
          await sb.from('job_photos').insert({job_id:jobId, team:myTeam, path});
          (photoData[jobId]=photoData[jobId]||[]).push(path); ok++;
          render();
        }catch(e){ console.warn('upload',e.message); }
      }
      toast(ok===files.length?`${ok} photo${ok>1?'s':''} added`:`${ok}/${files.length} uploaded — try the rest again`);
      render();
    }
    const sameManilaDay = ts => ts && new Date(ts).toLocaleDateString('en-CA',{timeZone:TZ})===manilaDate();
    function render(){
      const order={assigned:0,'en-route':1,'on-site':2,'in-progress':3,pending:4};
      $('#cToDo').textContent=jobs.filter(j=>['assigned','pending'].includes(j.status)).length;
      $('#cActive').textContent=jobs.filter(j=>['en-route','on-site','in-progress'].includes(j.status)).length;
      const doneToday=jobs.filter(j=>j.status==='completed'&&sameManilaDay(j.updated_at));
      $('#cDone').textContent=doneToday.length;
      $('#tabActive').classList.toggle('active',viewMode==='active');
      $('#tabDone').classList.toggle('active',viewMode==='done');

      let list;
      if(viewMode==='done'){ list=doneToday.slice().sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)); }
      else { list=jobs.filter(j=>j.status!=='completed').sort((a,b)=>(order[a.status]??9)-(order[b.status]??9)); }

      const el=$('#jobsList');
      if(!list.length){
        const msg=viewMode==='done'?'No completed jobs yet today.':`No active jobs for ${myTeam}.<br>New assignments appear here automatically.`;
        el.innerHTML=`<div class="empty">${svg('inbox')}${msg}</div>`;return;
      }
      el.innerHTML=list.map(j=>{
        const f=FLOW[j.status]||{};
        const prio=j.priority&&j.priority!=='Normal'?`<span class="prio ${j.priority==='VIP'?'vip':''}">${j.priority}</span>`:'';
        const addr=(j.address||j.area||'').replace(/"/g,'');
        const n=photoCount(j.id);
        const thumbsArr=(photoData[j.id]||[]);
        const thumbs=thumbsArr.slice(0,6).map(p=>`<img src="${pubUrl(p)}" alt="proof">`).join('')+(n>6?`<span class="more">+${n-6}</span>`:'');

        let extra='', actions='';
        const mapLink=`<a class="act ghost" href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank" rel="noopener" aria-label="Map">${svg('pin')}</a>`;

        if(j.status==='in-progress'){
          const canDone=n>=PHOTOS_REQUIRED;
          extra=`<div class="photos"><div class="photos-head"><span>Proof photos</span><span class="count ${canDone?'ok':'need'}">${n}/${PHOTOS_REQUIRED}</span></div>${n?`<div class="thumbs">${thumbs}</div>`:''}<label class="addphoto">${svg('camera')} Add photos<input type="file" accept="image/*" capture="environment" multiple hidden data-up="${j.id}"></label></div>`;
          actions=`<div class="job-actions">${mapLink}<button class="act done" data-next="completed" data-id="${j.id}" ${canDone?'':'disabled'}>${svg('check')}Mark complete${canDone?'':` (${n}/${PHOTOS_REQUIRED})`}</button></div>`;
        } else if(j.status==='completed'){
          extra=n?`<div class="photos"><div class="photos-head"><span>Proof photos</span><span class="count ok">${n}</span></div><div class="thumbs">${thumbs}</div></div>`:'';
          actions=`<div class="job-actions">${mapLink}<span class="act ghost" style="flex:1;justify-content:center">Completed ${j.updated_at?manilaTime(j.updated_at):''}</span></div>`;
        } else {
          const act=f.next?`<button class="act ${f.cls}" data-next="${f.next}" data-id="${j.id}">${svg(f.icon)}${f.action}</button>`:'<button class="act ghost" disabled style="flex:1;opacity:.5">No action</button>';
          actions=`<div class="job-actions">${mapLink}${act}</div>`;
        }
        const contact=j.primary_no?`<div class="row">${svg('phone')}<a href="tel:${j.primary_no}" style="color:inherit;text-decoration:none">${j.primary_no}${j.other_contact_no?' / '+j.other_contact_no:''}</a></div>`:'';
        const acct=(j.job_order_no||j.ibass_acct_no)?`<div class="row">${svg('note')}<span>${[j.job_order_no,j.ibass_acct_no].filter(Boolean).join(' · ')}</span></div>`:'';
        const note=j.special_note?`<div class="row" style="color:#c2503a">${svg('note')}<span>${j.special_note}</span></div>`:'';
        return `<div class="job"><div class="job-head"><div><span class="job-id">${j.id}</span><h3>${j.subscriber||'—'}${prio}</h3><p class="plan">${j.service_type||''} · ${j.plan||''}</p></div><span class="badge b-${j.status}">${statusLabel(j.status)}</span></div>
        <div class="job-meta"><div class="row">${svg('pin')}<span>${addr||'—'}</span></div><div class="row">${svg('clock')}<span>${(j.schedule||'Today').replace('Today, ','Today · ')}</span></div>${contact}${acct}${note}</div>
        ${extra}${actions}</div>`;
      }).join('');
      el.querySelectorAll('[data-next]').forEach(b=>b.onclick=()=>advance(b.dataset.id,b.dataset.next));
      el.querySelectorAll('[data-up]').forEach(inp=>inp.onchange=()=>{const id=inp.dataset.up,files=inp.files;uploadPhotos(id,files);inp.value='';});
    }

    function startApp(){
      $('#teamName').textContent=myTeam;
      show('appView'); setSync('syncing','Connecting…'); signature='';
      refresh();
      if(realtimeChan) sb.removeChannel(realtimeChan);
      realtimeChan = sb.channel('ahba-tech-'+myTeam).on('postgres_changes',{event:'*',schema:'public',table:'jobs'},refresh).subscribe();
      clearInterval(startApp._t); startApp._t=setInterval(refresh,15000);
      clearInterval(startApp._loc); startApp._loc=setInterval(()=>captureLocation(false),600000); // refresh GPS every 10 min
    }

    // ---------- auth ----------
    // fresh=true means an explicit sign-in (record a new time-in);
    // fresh=false means resuming an existing session (reuse open time-in).
    async function afterLogin(email, fresh){
      myTeam = teamFromEmail(email);
      let must=false;
      try{
        const {data}=await sb.from('technicians').select('must_change').eq('username',myTeam).maybeSingle();
        must = !!(data && data.must_change);
        sb.from('technicians').update({last_login:new Date().toISOString(), updated_at:new Date().toISOString()}).eq('username',myTeam).then(()=>{});
      }catch(e){}
      if(must){ pwForced = true; openPw(true); return; }
      await enterFlow(fresh);
    }

    // Clock in (fresh sign-in) or re-attach to an open time-in (resume), then open the app.
    async function enterFlow(fresh){
      if(fresh){ await clockIn(); } else { await findOpenAttendance(); }
      captureLocation(false);   // grab GPS on entry (prompts for permission first time)
      startApp();
    }

    function openPw(forced){
      $('#pwForceHint').classList.toggle('hidden', !forced);
      $('#pwCancel').classList.toggle('hidden', !!forced);
      $('#pwTitle').textContent = forced ? 'Set a new password' : 'Change password';
      clearErr('#pwErr'); $('#np1').value=''; $('#np2').value='';
      show('pwView');
    }

    $('#loginForm').addEventListener('submit', async e=>{
      e.preventDefault(); clearErr('#loginErr');
      const u=$('#uName').value.trim(), p=$('#uPass').value;
      if(!u||!p) return;
      const btn=$('#loginBtn'); btn.disabled=true; btn.textContent='Signing in…';
      const {data,error}=await sb.auth.signInWithPassword({email:emailFor(u), password:p});
      btn.disabled=false; btn.textContent='Sign in';
      if(error){ const m=error&&error.message?error.message:'Sign-in failed. Please try again.'; showErr('#loginErr', /invalid/i.test(m)?'Wrong username or password.':m); return; }
      afterLogin(data.user.email, true);
    });

    $('#pwForm').addEventListener('submit', async e=>{
      e.preventDefault(); clearErr('#pwErr');
      const a=$('#np1').value, b=$('#np2').value;
      if(a.length<8){ showErr('#pwErr','Password must be at least 8 characters.'); return; }
      if(a!==b){ showErr('#pwErr','Passwords do not match.'); return; }
      const btn=$('#pwBtn'); btn.disabled=true; btn.textContent='Saving…';
      const {error}=await sb.auth.updateUser({password:a});
      btn.disabled=false; btn.textContent='Save password';
      if(error){ showErr('#pwErr', error.message); return; }
      sb.from('technicians').update({must_change:false, password_changed_at:new Date().toISOString(), updated_at:new Date().toISOString()}).eq('username',myTeam).then(()=>{});
      toast('Password updated');
      if(pwForced){ pwForced=false; await enterFlow(true); }   // first-login: clock in now
      else { startApp(); }                                      // voluntary change: already clocked in
    });

    $('#pwCancel').onclick=()=>{ pwForced=false; startApp(); };
    $('#menuBtn').onclick=e=>{e.stopPropagation();$('#menuPop').classList.toggle('hidden')};
    document.addEventListener('click',()=>$('#menuPop').classList.add('hidden'));
    $('#menuPop').onclick=e=>e.stopPropagation();
    $('#mChangePw').onclick=()=>{$('#menuPop').classList.add('hidden');openPw(false)};
    $('#mLocate').onclick=()=>{$('#menuPop').classList.add('hidden');captureLocation(true)};
    $('#tabActive').onclick=()=>{viewMode='active';render()};
    $('#tabDone').onclick=()=>{viewMode='done';render()};
    $('#mLogout').onclick=async()=>{
      $('#menuPop').classList.add('hidden');
      await clockOut();                       // record time-out
      if(realtimeChan)sb.removeChannel(realtimeChan);
      clearInterval(startApp._t); clearInterval(startApp._loc);
      await sb.auth.signOut();
      myTeam=''; jobs=[]; $('#uName').value=''; $('#uPass').value='';
      toast('Timed out — signed off');
      show('loginView');
    };

    // resume existing session on load (do NOT create a new time-in)
    (async function init(){
      const {data}=await sb.auth.getSession();
      if(data.session && data.session.user){ afterLogin(data.session.user.email, false); }
      else { show('loginView'); }
    })();
  })();
  </script>
</body>
</html>
